name: Build Android Mod Menu APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # تم استبدال الـ wrapper التقليدي بأداة جيت هاب الرسمية لإعداد Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # البناء باستخدام أداة Gradle العامة مباشرة لتفادي الملف المفقود
      - name: Build APK with Gradle
        run: gradle assembleDebug --stacktrace

      - name: Upload Compiled APK
        uses: actions/upload-artifact@v4
        with:
          name: Mod-Menu-Artifacts
          path: app/build/outputs/apk/debug/*.apk
